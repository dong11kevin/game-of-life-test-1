<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conway's Game of Life</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#111827;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
}

h1{
    margin-top:20px;
}

p{
    color:#bbb;
    margin-bottom:15px;
}

.controls{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-bottom:15px;
}

button{
    padding:10px 16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#2563eb;
    color:white;
    font-size:15px;
    transition:.2s;
}

button:hover{
    background:#1d4ed8;
}

input[type=range]{
    width:120px;
}

canvas{
    border:2px solid #374151;
    background:#000;
    margin-bottom:20px;
    touch-action:none;
}

.stats{
    display:flex;
    gap:40px;
    margin-bottom:20px;
    font-size:18px;
}
</style>

</head>
<body>

<h1>Conway's Game of Life</h1>

<p>Click cells to toggle life.</p>

<div class="controls">

<button id="start">▶ Start</button>
<button id="step">Step</button>
<button id="random">Random</button>
<button id="clear">Clear</button>

<label>
Speed
<input id="speed" type="range" min="2" max="30" value="10">
</label>

</div>

<div class="stats">
<div>Generation: <span id="gen">0</span></div>
<div>Population: <span id="pop">0</span></div>
</div>

<canvas id="game"></canvas>

<script>

const rows = 60;
const cols = 80;
const cellSize = 12;

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = cols * cellSize;
canvas.height = rows * cellSize;

let grid = [];
let running = false;
let generation = 0;
let timer = null;

function createGrid(){
    grid = [];
    for(let r=0;r<rows;r++){
        let row=[];
        for(let c=0;c<cols;c++){
            row.push(0);
        }
        grid.push(row);
    }
}

createGrid();

function draw(){

    ctx.fillStyle="#000";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let population=0;

    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){

            if(grid[r][c]){
                population++;
                ctx.fillStyle="#34d399";
                ctx.fillRect(
                    c*cellSize,
                    r*cellSize,
                    cellSize,
                    cellSize
                );
            }

            ctx.strokeStyle="#222";
            ctx.strokeRect(
                c*cellSize,
                r*cellSize,
                cellSize,
                cellSize
            );

        }
    }

    document.getElementById("gen").textContent=generation;
    document.getElementById("pop").textContent=population;

}

function neighbors(r,c){

    let total=0;

    for(let i=-1;i<=1;i++){
        for(let j=-1;j<=1;j++){

            if(i===0 && j===0) continue;

            let rr=r+i;
            let cc=c+j;

            if(rr>=0 && rr<rows && cc>=0 && cc<cols){
                total+=grid[rr][cc];
            }

        }
    }

    return total;

}

function nextGeneration(){

    let next=[];

    for(let r=0;r<rows;r++){

        next[r]=[];

        for(let c=0;c<cols;c++){

            let alive=grid[r][c];
            let n=neighbors(r,c);

            if(alive){

                if(n===2 || n===3)
                    next[r][c]=1;
                else
                    next[r][c]=0;

            }else{

                if(n===3)
                    next[r][c]=1;
                else
                    next[r][c]=0;

            }

        }

    }

    grid=next;
    generation++;

    draw();

}

canvas.addEventListener("click",e=>{

    const rect=canvas.getBoundingClientRect();

    const x=Math.floor((e.clientX-rect.left)/cellSize);
    const y=Math.floor((e.clientY-rect.top)/cellSize);

    grid[y][x]=grid[y][x]?0:1;

    draw();

});

document.getElementById("random").onclick=()=>{

    generation=0;

    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
            grid[r][c]=Math.random()>0.72?1:0;
        }
    }

    draw();

}

document.getElementById("clear").onclick=()=>{

    generation=0;
    createGrid();
    draw();

}

document.getElementById("step").onclick=()=>{

    nextGeneration();

}

function start(){

    const fps=document.getElementById("speed").value;

    timer=setInterval(nextGeneration,1000/fps);

}

function stop(){

    clearInterval(timer);

}

document.getElementById("start").onclick=()=>{

    running=!running;

    if(running){

        start();
        document.getElementById("start").textContent="⏸ Pause";

    }else{

        stop();
        document.getElementById("start").textContent="▶ Start";

    }

}

document.getElementById("speed").oninput=()=>{

    if(running){

        stop();
        start();

    }

}

draw();

</script>

</body>
</html>
